harms:
  - id: HARM-007
    harm: Implementing the historical behavioural model literally could turn service analytics into covert person-level profiling or manipulative adaptation.
    affected_groups:
      - Disabled and neurodivergent users
      - Users with English as an additional language
      - Users under time pressure or distress
      - Users of assistive technology
      - People using public services
    likelihood: high
    severity: high
    mitigation: Treat education, literacy, intelligence, personality, openness, sociability, conscientiousness and ICT-ability inference as rejected; use interaction evidence to investigate service friction; require aggregate-first reporting, alternative explanations, k-anonymity, user control, explicit adaptation consent, accessible override and human review.
    residual_risk: medium
    owner: governance-lead
    escalation_route: Product owner, data protection lead, accessibility lead and ethics reviewer
    release_decision: blocked

  - id: HARM-006
    harm: UK English spelling, grammar or casing indicators could be treated as a judgement about a visitor or disadvantage people whose names, dialect, disability, education, language background or writing style differ from the analyser assumptions.
    affected_groups:
      - Disabled and neurodivergent users
      - Users of dialects
      - Users who use English as an additional language
      - Users entering names or specialist terminology
    likelihood: medium
    severity: high
    mitigation: Require on-device consented analysis and an atomic en-GB count bundle; export no words or suggestions; label results as possible issues; keep scoring small and service-friction-only; prohibit literacy, intelligence, professionalism, personality, protected-characteristic and automated-decision interpretations; require representative accessibility and fairness validation.
    residual_risk: medium
    owner: governance-lead
    escalation_route: Product owner, data protection lead, accessibility lead and ethics reviewer
    release_decision: blocked

  - id: HARM-001
    harm: Behavioural analytics could be interpreted as judgement about a user rather than evidence about service friction.
    affected_groups:
      - Disabled users
      - Neurodivergent users
      - Users with low digital confidence
      - Users under stress
    likelihood: medium
    severity: high
    mitigation: Lead with cumulative service-level evidence, keep pseudonymous journey detail behind an intentional drill-down, hide visitor identifiers, use neutral values for unsupported indicators, and retain plain-English copy that frames every score as service-improvement evidence rather than a user classification.
    residual_risk: medium
    owner: governance-lead
    escalation_route: Product owner and ethics reviewer
    release_decision: blocked
  - id: HARM-002
    harm: Interaction telemetry could expose personal data if content, identifiers or free text are collected.
    affected_groups:
      - All service users
      - Vulnerable users
      - Users completing high-stakes forms
    likelihood: medium
    severity: critical
    mitigation: Enforce consent first, create identifiers only after consent, clear them on revocation, exclude email, telephone, password, payment and one-time-code values and sensitive/auth form interactions from ordinary capture, represent sensitive autocomplete only by an allow-listed category with no value or length, use controlled type-first semantic keys where supplied or safe structural fallbacks otherwise, reject every optional metadata field on neutral authentication milestones, keep the capture engine and UK-English resources in Flux rather than publisher repositories, omit unchanged prefilled value lengths, collect metadata only, export no text values and run collector schema tests.
    residual_risk: high
    owner: security-lead
    escalation_route: Product owner and data protection lead
    release_decision: blocked
  - id: HARM-003
    harm: Collector route could be exposed before CORS, rate limiting, retention and operational controls are defined.
    affected_groups:
      - All service users
      - Vulnerable users
      - Users completing high-stakes forms
      - Service teams relying on telemetry evidence
    likelihood: medium
    severity: high
    mitigation: Restrict the D1-backed collector to named tenant origins, validate metadata-only schema events and keep account emails separate from visitor records. Production rate limiting, retention, deletion and incident controls still require review.
    residual_risk: medium
    owner: product-lead
    escalation_route: Product owner and security lead
    release_decision: blocked
  - id: HARM-004
    harm: Small or deficit-framed cohorts could enable re-identification, stereotyping or unfair conclusions about service users.
    affected_groups:
      - Disabled users
      - Neurodivergent users
      - Users with low digital confidence
      - Users from small or marginalised groups
    likelihood: medium
    severity: high
    mitigation: Describe cohorts as journey patterns rather than people, suppress every named cohort below five journeys, expose no visitor identifier, treat neutral evidence as no dominant pattern, prohibit protected-characteristic and education or personality inference, and require human-led service investigation with uncertainty and fairness review.
    residual_risk: medium
    owner: governance-lead
    escalation_route: Product owner, data protection lead and ethics reviewer
    release_decision: blocked
  - id: HARM-005
    harm: Misleading journey prose could attribute pointer use to typing or present implementation identifiers as meaningful service controls.
    affected_groups:
      - Service analysts
      - Keyboard and assistive-technology users
    likelihood: low
    severity: medium
    mitigation: Separate focus origin, pre-input dwell, active typing time, keyboard entry and focus-exit method; calculate standard gross WPM from current printable non-shortcut keystrokes rather than whole-field word counts; collapse Tab runs to their final destination; describe Enter activation as keyboard navigation; never relabel total focus as dwell after input; translate only controlled semantic keys; and regression-test historical presentation.
    residual_risk: low
    owner: product-lead
    escalation_route: Product owner and accessibility lead
    release_decision: proceed-with-monitoring

harms:
  - id: HARM-009
    harm: A tenant owner could misconfigure a funnel, success event, field binding, required status or complexity and cause the dashboard to present incomplete or incorrect service meaning.
    affected_groups:
      - Service teams relying on behavioural analytics
      - People whose journeys inform service changes
    likelihood: medium
    severity: medium
    mitigation: Restrict mutation to tenant owners; validate every complete model; require exact controlled action and data-flux-key bindings; constrain service complexity to 1–7 on question groups; distinguish required from optional fields; reject cross-funnel and duplicate bindings; preserve stable keys on label edits; cascade deleted question bindings; publish immutable versions; reject version conflicts; retain historical event-time context; show funnels without success events as incomplete rather than inferring completion; and describe complexity as service configuration rather than a judgement of the user.
    residual_risk: low
    owner: product-lead
    escalation_route: Product owner and governance lead
    release_decision: proceed-with-monitoring

  - id: HARM-008
    harm: A realtime analytics panel could become a live surveillance view of identifiable service users.
    affected_groups:
      - People using public services
      - Users in small or low-traffic cohorts
      - Vulnerable users
    likelihood: medium
    severity: high
    mitigation: Report only aggregate 5/30-minute session and interaction counts, zero-filled minute buckets and ingestion health; expose no visitor/session identifiers, precise location, page content, narratives or live user snapshot; keep individual journeys in a separate authenticated intentional drill-down.
    residual_risk: low
    owner: governance-lead
    escalation_route: Product owner, data protection lead and security lead
    release_decision: proceed-with-monitoring

  - id: HARM-007
    harm: Implementing the historical behavioural model literally could turn service analytics into covert person-level profiling or manipulative adaptation.
    affected_groups:
      - Disabled and neurodivergent users
      - Users with English as an additional language
      - Users under time pressure or distress
      - Users of assistive technology
      - People using public services
    likelihood: high
    severity: high
    mitigation: Treat education, literacy, intelligence, personality, openness, sociability, conscientiousness and ICT-ability inference as rejected; keep a requirement ledger that distinguishes implemented, partial, retained and reframed capabilities; use interaction evidence to investigate service friction; require aggregate-first reporting, alternative explanations, k-anonymity, user control, explicit adaptation consent, accessible override and human review.
    residual_risk: medium
    owner: governance-lead
    escalation_route: Product owner, data protection lead, accessibility lead and ethics reviewer
    release_decision: blocked

  - id: HARM-006
    harm: UK English spelling, grammar or casing indicators could be treated as a judgement about a visitor or disadvantage people whose names, dialect, disability, education, language background or writing style differ from the analyser assumptions.
    affected_groups:
      - Disabled and neurodivergent users
      - Users of dialects
      - Users who use English as an additional language
      - Users entering names or specialist terminology
    likelihood: medium
    severity: high
    mitigation: Require on-device consented analysis and an atomic en-GB count bundle; export no words or suggestions; label results as possible issues; keep scoring small and service-friction-only; prohibit literacy, intelligence, professionalism, personality, protected-characteristic and automated-decision interpretations; require representative accessibility and fairness validation.
    residual_risk: medium
    owner: governance-lead
    escalation_route: Product owner, data protection lead, accessibility lead and ethics reviewer
    release_decision: blocked

  - id: HARM-001
    harm: Behavioural analytics could be interpreted as judgement about a user rather than evidence about service friction.
    affected_groups:
      - Disabled users
      - Neurodivergent users
      - Users with low digital confidence
      - Users under stress
    likelihood: medium
    severity: high
    mitigation: Lead with cumulative service-level evidence, derive completion only from publisher-configured success outcomes rather than generic submits, label entity time as elapsed time rather than difficulty, define abandonment as a closed session without an outcome, describe field non-interaction neutrally rather than calling it a skip, show journey samples and Wilson intervals with collection/model caveats, keep pseudonymous journey detail behind an intentional drill-down, hide visitor identifiers, use neutral values for unsupported indicators, and retain plain-English copy that frames every score as service-improvement evidence rather than a user classification.
    residual_risk: medium
    owner: governance-lead
    escalation_route: Product owner and ethics reviewer
    release_decision: blocked
  - id: HARM-002
    harm: Interaction telemetry could expose personal data if content, identifiers or free text are collected.
    affected_groups:
      - All service users
      - Vulnerable users
      - Users completing high-stakes forms
    likelihood: medium
    severity: critical
    mitigation: Enforce consent first, create identifiers only after consent, clear them on revocation, exclude email, telephone, password, payment and one-time-code values and sensitive/auth form interactions from ordinary capture, represent sensitive autocomplete only by an allow-listed unbound category with no value or length, use controlled type-first semantic keys where supplied or safe structural fallbacks otherwise, reject every optional metadata field on neutral authentication milestones, keep the capture engine and UK-English resources in Flux rather than publisher repositories, omit unchanged prefilled value lengths, aggregate field dwell and length only into fixed buckets, collect metadata only, export no text values and run collector schema tests.
    residual_risk: high
    owner: security-lead
    escalation_route: Product owner and data protection lead
    release_decision: blocked
  - id: HARM-003
    harm: Collector route could be exposed before CORS, rate limiting, retention and operational controls are defined.
    affected_groups:
      - All service users
      - Vulnerable users
      - Users completing high-stakes forms
      - Service teams relying on telemetry evidence
    likelihood: medium
    severity: high
    mitigation: Restrict the D1-backed collector to named tenant origins, validate metadata-only schema events, keep account emails separate from visitor records, reject remote-D1-incompatible transaction control in generated migrations, and test complex report SQL against known production D1 query limits. Production rate limiting, retention, deletion and incident controls still require review.
    residual_risk: medium
    owner: product-lead
    escalation_route: Product owner and security lead
    release_decision: blocked
  - id: HARM-004
    harm: Small or deficit-framed cohorts could enable re-identification, stereotyping or unfair conclusions about service users.
    affected_groups:
      - Disabled users
      - Neurodivergent users
      - Users with low digital confidence
      - Users from small or marginalised groups
    likelihood: medium
    severity: high
    mitigation: Describe cohorts and comparison groups as journey patterns rather than people, suppress every named group and repeat-interval bucket below five journeys, expose no visitor identifier, show lifecycle samples and denominators, describe celeration as service-level movement with alternative explanations, limit dimensions to controlled service evidence, treat neutral evidence as no dominant pattern, prohibit learning, ability, protected-characteristic and education or personality inference, and require human-led service investigation with uncertainty and fairness review.
    residual_risk: medium
    owner: governance-lead
    escalation_route: Product owner, data protection lead and ethics reviewer
    release_decision: blocked
  - id: HARM-005
    harm: Misleading journey prose could attribute pointer use to typing or present implementation identifiers as meaningful service controls.
    affected_groups:
      - Service analysts
      - Keyboard and assistive-technology users
    likelihood: low
    severity: medium
    mitigation: Separate focus origin, pre-input dwell, active typing time, keyboard entry and focus-exit method; calculate standard gross WPM from current printable non-shortcut keystrokes rather than whole-field word counts; collapse Tab runs to their final destination; describe Enter activation as keyboard navigation; never relabel total focus as dwell after input; translate only controlled semantic keys; and regression-test historical presentation.
    residual_risk: low
    owner: product-lead
    escalation_route: Product owner and accessibility lead
    release_decision: proceed-with-monitoring

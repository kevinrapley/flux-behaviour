harms:
  - id: HARM-001
    harm: Behavioural analytics could be interpreted as judgement about a user rather than evidence about service friction.
    affected_groups:
      - Disabled users
      - Neurodivergent users
      - Users with low digital confidence
      - Users under stress
    likelihood: medium
    severity: high
    mitigation: Lead with cumulative service-level evidence, keep pseudonymous journey detail behind an intentional drill-down, hide visitor identifiers, use neutral values for unsupported indicators, and retain plain-English copy that frames every score as service-improvement evidence rather than a user classification.
    residual_risk: medium
    owner: governance-lead
    escalation_route: Product owner and ethics reviewer
    release_decision: blocked
  - id: HARM-002
    harm: Interaction telemetry could expose personal data if content, identifiers or free text are collected.
    affected_groups:
      - All service users
      - Vulnerable users
      - Users completing high-stakes forms
    likelihood: medium
    severity: critical
    mitigation: Enforce consent first, create identifiers only after consent, clear them on revocation, exclude email, telephone, password and one-time-code inputs from auto-capture, support explicit sensitive-field markers, use controlled type-first semantic keys where supplied or neutral structural control keys otherwise, allow only content-free OTP requested/succeeded/failed milestones, preserve source-to-built tracker parity, collect metadata only, export no text values and run collector schema tests.
    residual_risk: high
    owner: security-lead
    escalation_route: Product owner and data protection lead
    release_decision: blocked
  - id: HARM-003
    harm: Collector route could be exposed before CORS, rate limiting, retention and operational controls are defined.
    affected_groups:
      - All service users
      - Vulnerable users
      - Users completing high-stakes forms
      - Service teams relying on telemetry evidence
    likelihood: medium
    severity: high
    mitigation: Restrict the D1-backed collector to named tenant origins, validate metadata-only schema events and keep account emails separate from visitor records. Production rate limiting, retention, deletion and incident controls still require review.
    residual_risk: medium
    owner: product-lead
    escalation_route: Product owner and security lead
    release_decision: blocked
  - id: HARM-004
    harm: Small or deficit-framed cohorts could enable re-identification, stereotyping or unfair conclusions about service users.
    affected_groups:
      - Disabled users
      - Neurodivergent users
      - Users with low digital confidence
      - Users from small or marginalised groups
    likelihood: medium
    severity: high
    mitigation: Describe cohorts as journey patterns rather than people, suppress every named cohort below five journeys, expose no visitor identifier, treat neutral evidence as no dominant pattern, prohibit protected-characteristic and education or personality inference, and require human-led service investigation with uncertainty and fairness review.
    residual_risk: medium
    owner: governance-lead
    escalation_route: Product owner, data protection lead and ethics reviewer
    release_decision: blocked

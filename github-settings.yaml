default_branch: main
branch_protection:
  require_pull_request_reviews: true
  required_reviews: 1
  required_approving_review_count: 1
  dismiss_stale_reviews: true
  require_code_owner_reviews: true
  require_status_checks: true
  required_status_checks:
    - CI (Accessibility)
    - CI (Conformance)
    - CI (Documentation Quality)
    - CI (Node)
    - CI (Performance)
    - CodeQL
    - Dependency Review
    - File Inventory
    - CycloneDX SBOM
  require_conversation_resolution: true
  require_signed_commits: false
  linear_history: true
  allow_force_pushes: false
  allow_deletions: false
workflow_permissions: read
security_features:
  dependabot: true
  dependabot_updates: true
  secret_scanning: true
  push_protection: true
  code_scanning: true
  dependency_review: true
  sbom_on_release: true
actions_policy:
  allowed_actions: local-and-verified
  sha_pinning_required: true
  oidc_for_deployments: true
  default_workflow_permissions: read
repository_rulesets:
  required: true
environments:
  deployment_protections_required: true
verification_method: github-api-2026-07-13
observed_state:
  default_branch: main
  branch_protection_api: branch-not-protected
  repository_ruleset_count: 0
  desired_branch_controls_enforced: false

    recent_learnings:
      read: true
      updated: true
      entry: The SDK must validate against the shared contract before transport; demo honesty requires labelling fixtures and delivery uncertainty; GOV.UK demo build mirrors the ResearchOps pattern.
    security:
      collector_promoted: false
      sdk_promoted: true
      cloudflare_config_promoted: false
      notes: Tag strips unknown fields before validation, drops invalid events, sends credentials-omitted requests and never persists consent state. CI workflows now run npm ci against the committed lockfile.
    privacy:
      consent_gate: Events are dropped, never queued, before consent; revocation stops emission immediately.
      data_boundary: Only contract fields leave the page; typed values, free text and identifiers are stripped client-side and rejected server-side.
    accessibility:
      status: partial
      notes: GOV.UK Frontend components, skip link, aria-live event log and accessible chart summaries are in place; a full audit is recorded as GAP-006.
    risks:
      - Fire-and-forget transport gives no delivery observability (GAP-007).
      - Charts follow ONS Charts conventions but do not vendor the library (GAP-005).
      - Demo has not had a full accessibility audit (GAP-006).

    files_changed:
      - migrations/0005_event_ingestion_time.sql
      - src/product/realtime-analytics.mjs
      - src/product/router.mjs
      - src/dashboard/live-dashboard.mjs
      - demo/templates/pages/dashboard.njk
      - demo/styles/demo.scss

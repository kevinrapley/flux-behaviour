    promotion_decisions:
      - Require a complete service hierarchy, outcomes and key events before publication instead of allowing generic-submit completion inference.
      - Freeze the exact published model version and resolved hierarchy beside each accepted event.
      - Seed the initial ResearchOps model deterministically from governed JSON rather than embedding analytics logic in ResearchOps.
      - Keep funnels and field-coverage reports open in GAP-013 instead of overstating this implementation slice.
    commands_run:
      - command: node --test tests/service-model*.test.mjs tests/researchops-service-model.test.mjs tests/dashboard-service-model-panel.test.mjs
        state: verified
        status: passed
        evidence: All 35 focused service-model tests passed before the completion-proxy and responsive-table additions.
      - command: npm test
        state: verified
        status: passed
        evidence: All 236 repository tests passed after configured-outcome completion, contract-bound identifier checks and exact service-model routing replaced generic submit inference.
      - command: npx wrangler d1 migrations apply flux-behaviour --local --persist-to /tmp/flux-service-model.uzKvZR --config wrangler.toml
        state: verified
        status: passed
        evidence: Migrations 0001 through 0004 applied successfully to a fresh local D1 persistence directory.
      - command: npx wrangler d1 execute flux-behaviour --local --persist-to /tmp/flux-service-model.uzKvZR --config wrangler.toml --command SELECT-counts
        state: verified
        status: passed
        evidence: Fresh D1 contained 38 entities, 43 bindings, 8 outcomes, 15 key events and one published model.
      - command: npm run demo:build
        state: verified
        status: passed
        evidence: Dashboard source, styles and generated assets rebuilt successfully.
      - command: frontend visual verification at 1440x900 and 390x844
        state: verified
        status: passed
        evidence: Populated and error states rendered; key-event disclosure opened; two outcome rows rendered without sentinel values; mobile page width remained 390px while the 560px table scrolled inside a 360px region.
      - command: npm run validate
        state: verified
        status: passed
        evidence: Repository governance file check passed for 19 files.
      - command: npm run security:secrets
        state: verified
        status: passed
        evidence: Secret pattern sanity scan passed.
      - command: git diff --check
        state: verified
        status: passed
        evidence: No whitespace errors were reported.
      - command: ruby YAML safe-load for governed records
        state: verified
        status: passed
        evidence: Agent evidence, conformance, gap and harm YAML records parsed successfully.
    recent_learnings:
      - Completion is a configured transaction outcome, not a generic form submission.
      - Wide aggregate tables need a contained scroll region at mobile breakpoints.
    security:
      - Publication is owner-only, tenant-scoped, immutable by version and protected by authenticated dashboard sessions.
      - Model keys and labels are bounded; unknown properties, URLs, email-like labels and ambiguous event matches are rejected.
    privacy:
      - The service model contains service configuration only and never visitor identity, page content or entered values.
      - Event-time context stores controlled hierarchy and outcome keys only; no raw-event export was added.
    accessibility:
      - The model and outcome evidence uses semantic headings, details and tables.
      - Desktop and mobile rendered states were checked; the wide outcome table scrolls within its region without causing page-level horizontal overflow.
    risks:
      - The initial ResearchOps model is incomplete until every required transaction and field is inventoried.
      - Funnel, field-coverage and broader report APIs remain governed gaps and release blockers.

promotion_decisions:
  - Keep task and funnel definitions tenant-owned and generic; ResearchOps supplies configuration rather than Flux product logic.
  - Publish every owner action as a complete immutable next model version so historical evidence keeps its event-time meaning.
  - Preserve stable keys when labels change and require exact publisher data-flux-key values for ordered steps and completion events.
  - Permit a service-only model with empty outcome and key-event collections so new tenants can configure incrementally.
  - Restrict mutation to tenant owners, retain viewer read access and reject concurrent version overwrite.
  - Cascade deletion through dependent hierarchy and bindings while never rewriting historical versions.

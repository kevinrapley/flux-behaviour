recent_learnings:
  - A raw publication API does not make a service model practically publisher-owned; owners need an authenticated authoring workflow.
  - A new tenant must be able to publish a service root before it has invented funnels or completion outcomes.
  - Stable keys, exact semantic bindings and immutable versions allow labels and structure to evolve without rewriting historical meaning.
security:
  - The dashboard hides mutation from viewers and the publication API independently enforces the tenant-owner role.
  - Existing-version conflicts are rejected rather than overwriting another owner's publication.
privacy:
  - Configuration contains controlled service labels and semantic keys only; no visitor identity, event payload, entered value or page content is introduced.
accessibility:
  - The editor uses semantic sections, headings, lists, labelled native inputs and buttons, visible status messages and responsive action layouts.
risks:
  - Owner configuration can still be semantically wrong even when structurally valid; HARM-009 retains human review and exact-key mitigation.
  - Question, field and complexity authoring remains outside this change and is retained under GAP-013.

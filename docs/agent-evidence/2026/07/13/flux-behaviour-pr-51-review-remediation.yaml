recent_learnings:
  - Outcome authoring must preserve and expose every action-and-element match rather than collapsing an outcome to its first key event.
  - Transaction bindings without explicit provenance must be retained when an outcome changes.
  - Incremental authoring requires same-transaction binding promotion and pre-publication contract bounds.
security:
  - Direct publication and collection both reject semantic keys over the common 160-character boundary, while exact prohibited legacy bindings retain the existing transition rule.
  - No credentials, visitor data, event payloads or entered content were introduced.
privacy:
  - The metadata-only element-key allowance expands from 120 to 160 characters, but the controlled semantic-key pattern and content-bearing-field prohibition are unchanged; no entered content or journey identity is exposed.
accessibility:
  - Every matching success event is rendered as its own labelled row with keyboard-operable edit and delete buttons; existing semantic forms and responsive layout are retained.
risks:
  - Retained transaction bindings can remain after their last matching event is removed, but preserving publisher semantic meaning is safer than deleting a binding with unknown provenance.
  - Publisher configuration can still be semantically wrong despite structural validation; HARM-009 retains owner review and immutable-version controls.

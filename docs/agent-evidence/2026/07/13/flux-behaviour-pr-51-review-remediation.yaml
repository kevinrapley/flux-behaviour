promotion_decisions:
  - Treat every unresolved Codex thread on merged PR 51 as a follow-up correctness fix on current main rather than rewriting the merged feature branch.
  - Render and mutate every key event explicitly when several events resolve to one outcome; remove an outcome only after its final event disappears.
  - Retain transaction-level bindings when success events change because the model does not record whether a binding was event-created or independently publisher-declared.
  - Allow a same-transaction success binding to be promoted to an ordered step so owners can configure either object first.
  - Use one 160-character semantic-key limit for generated identifiers, publisher bindings, owner workflows, direct publication and collected events while preserving exact authorised legacy bindings.
  - Bound generated entity, outcome and key-event identifiers before adding collision suffixes.

promotion_decisions:
  - Keep field and complexity definitions tenant-owned and generic; Flux supplies the model editor while a connected service supplies its semantic data-flux-key attributes.
  - Follow the governed hierarchy by declaring 1–7 service complexity on a question or field group rather than inventing field-level complexity.
  - Publish every create, edit and delete as a complete immutable next model version while retaining stable entity keys on edits.
  - Require each field to declare required or optional status and an exact unique publisher data-flux-key binding.
  - Restrict mutation to tenant owners, retain viewer read access and reject concurrent version overwrite through the existing publication route.
  - Cascade question deletion through child fields, bindings and matching key events without rewriting historical versions.

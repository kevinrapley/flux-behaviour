recent_learnings:
  - A configuration editor must mirror where the governed model owns meaning; complexity belongs to the parent question group, while required status and binding belong to its fields.
  - Complexity copy must describe service demands and must not become a judgement about the person completing a field.
  - Stable keys, unique semantic bindings and immutable versions allow field configuration to change without rewriting historical meaning.
security:
  - The dashboard hides mutation from viewers and the publication API independently enforces the tenant-owner role.
  - Existing-version conflicts are rejected rather than overwriting another owner's publication.
  - Global content-free autocomplete categories are rejected as field-specific bindings, and publisher keys are capped at the collector contract's 120-character limit.
privacy:
  - Configuration contains controlled service labels, bounded complexity and semantic keys only; no visitor identity, event payload, entered value or page content is introduced.
accessibility:
  - The editor uses semantic articles and headings, labelled native inputs and selects, visible status messages, keyboard-operable buttons and responsive action layouts without mobile horizontal overflow.
risks:
  - Owner configuration can still be semantically wrong even when structurally valid; HARM-009 retains human review, exact-key and bounded-complexity mitigations.
  - The ResearchOps service inventory and comparable complexity-adjusted baselines remain incomplete under GAP-013.

promotion_decisions:
  - Publish one source-owned, generated developer route and expose it from both global navigation and the homepage.
  - Document the runtime as implemented: event schema 1.2.0, every hosted data-flux attribute, manual and automatic consent behaviour, owner/viewer model workflows and all routed collector/auth/model/dashboard/export APIs.
  - Treat collector POST as the public integration boundary and label Flux-session dashboard routes as authenticated application APIs rather than a tenant-generic reporting API.
  - Keep current pre-release and governance blockers prominent instead of presenting the public documentation as general-availability approval.

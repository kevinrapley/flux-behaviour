recent_learnings:
  - A source template is not a shipped developer experience until its route is rendered, published and linked from the public interface.
  - Public integration copy must be checked against current runtime attributes, versioned contracts and authenticated route boundaries.
security:
  - The guide keeps OAuth and Flux secrets server-side, documents credentials omission for collection and uses secure session-cookie authentication only for application APIs.
  - No secret, bearer credential or environment-specific protected configuration was added.
privacy:
  - The guide explains consent gating, revocation, sensitive-control exclusion, controlled semantic keys, content-free metadata and the prohibition on entered values and direct identifiers.
  - Existing release blockers for retention, deletion, DPIA, rate limiting, incident controls and fairness validation remain explicit.
accessibility:
  - The route uses semantic headings, navigation, tables, lists, disclosures, code examples and GOV.UK components.
  - Chrome checks at desktop and 390px mobile confirmed readable responsive layout and no horizontal overflow; GAP-006 retains the outstanding full audit.
risks:
  - Documentation can drift from runtime contracts; focused build assertions and the source instrumentation guide now protect the current version and critical public attributes.
  - The public route improves implementation guidance but does not approve general availability or close any operational release blocker.

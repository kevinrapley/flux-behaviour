promotion_decisions:
  - Use an opaque public per-tenant installation tag and retain exact origin allow-listing as the collection authority boundary.
  - Provision tenant, tag and initial owner atomically through an authenticated platform-admin route.
  - Permit only the literal ResearchOps reference to use the legacy direct tenant-ID collection path.
  - Keep tags stable and retrievable by tenant owners; record self-service rotation, origin and membership administration as a remaining gap.

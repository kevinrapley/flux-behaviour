recent_learnings:
  - A public installed tenant identifier is routing configuration rather than a credential.
  - Tenant, tag and initial owner creation must be one atomic invariant.
security:
  - Tags are opaque, unique and resolved before collection, while exact origin allow-listing remains mandatory.
  - Platform-wide provisioning authority is explicit and does not derive from tenant ownership.
  - No secret or environment-specific protected configuration was added.
privacy:
  - Tags contain no visitor, session, account or publisher-entered content and do not expand the metadata-only event contract.
  - Existing consent, sensitive-field and authenticated reporting controls remain unchanged.
accessibility:
  - Public developer guidance uses the existing semantic GOV.UK documentation structure.
  - Chrome checks at desktop and 390px mobile confirmed readable responsive layout, contained code overflow and no document-level horizontal scrolling.
risks:
  - Public tags could be mistaken for credentials; documentation and runtime boundaries state that origin controls and authenticated administration remain required.
  - Platform-admin grants and post-provisioning lifecycle operations remain controlled operator workflows tracked in GAP-019.

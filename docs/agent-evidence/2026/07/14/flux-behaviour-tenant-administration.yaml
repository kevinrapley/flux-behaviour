recent_learnings:
  - Tenant administration must combine property configuration, least-privilege access, governed export and recoverable lifecycle controls.
  - Trash can stop collection immediately without making an unsupported physical-deletion claim.
security:
  - Every mutation requires authenticated owner or explicit platform-admin authority and remains tenant-scoped.
  - Exact allowed origins remain collection authority; the public installation tag is not treated as a credential.
  - Final-owner guards prevent orphaned administration, and no secret or environment-specific protected configuration was added.
privacy:
  - Administration exports contain daily aggregate counts only and exclude raw events, narratives, metadata and pseudonymous identifiers.
  - Trashing revokes collection immediately while honestly retaining historical evidence until a governed permanent-purge policy exists.
accessibility:
  - The administration surface uses semantic GOV.UK labels, fields, status messaging, warning text and native controls.
  - Desktop and 390px mobile browser checks covered long content, active/trash states, restore/save/error interactions and document overflow.
risks:
  - Physical purge is not automated; the interface and documentation identify the date as purge eligibility and GAP-019 remains open.
  - Platform-admin grants remain an operator workflow and tenant ownership does not confer platform-wide authority.

promotion_decisions:
  - Adapt the Google Analytics property pattern as a Flux tenant selector with scoped settings, access, export and trash lifecycle.
  - Keep tenant creation restricted to explicit platform administrators and preserve one unique stable installation tag per tenant.
  - Let owners administer exact origins and owner/viewer access while refusing removal or demotion of the final owner.
  - Treat delete as immediate collection shutdown plus a 35-day recoverable trash state, not as unimplemented permanent physical deletion.
  - Keep every tenant export aggregate-only and exclude raw events, narratives and pseudonymous identifiers.

promotion_decisions:
  - Reject restoration at or after the declared recovery deadline even when physical purge remains pending.
  - Preserve the final owner with conditional database writes whose owner count is evaluated atomically with removal or demotion.
  - Bound and group interactions by server acceptance time independently of session-start aggregates.
  - Omit installation tags from viewer tenant-list responses and disclose administration account-email processing.
  - Record the affected account, access operation and resulting role for each membership mutation.

recent_learnings:
  - A final-owner preflight count is insufficient because concurrent mutations can both pass; the invariant belongs in the conditional write.
  - Daily event evidence must use server acceptance boundaries independently of session-start dates.
security:
  - Viewer responses no longer expose installation tags, and concurrent membership changes cannot orphan tenant ownership.
  - Access audit evidence identifies the affected account, operation and resulting role without joining account identity to visitor analytics.
privacy:
  - The admin footer now accurately discloses account-email use while preserving the separation from analytics identifiers.
  - Aggregate exports still exclude raw events and identifiers while assigning interactions to their server-accepted day.
accessibility:
  - The administration page retains the existing semantic GOV.UK footer and status structure; only the privacy disclosure text changed.
risks:
  - Permanent physical purge remains unimplemented and governed by GAP-019; expired tenants remain non-restorable while awaiting that process.
  - The membership mutation and its audit insert are separate D1 operations because the runtime exposes no interactive transaction API; the ownership invariant itself is atomic.

      - command: npm run security:secrets
        result: pass
        evidence: Secret pattern sanity scan passed.
      - command: npm run sbom
        result: pass
        evidence: CycloneDX SBOM generated successfully.
    recent_learnings:
      - Controlled semantic attributes provide useful service meaning without weakening the metadata-only privacy boundary.
    security:
      - Authentication milestones require the allow-listed action, neutral service shape and no optional metadata at SDK and collector boundaries.
    privacy:
      - No visible text, typed value, email, authentication code, challenge identifier or account identity is introduced.
    accessibility:
      - Narrative text remains plain-language prose and does not alter dashboard interaction or visual structure.
    risks:
      - Positional fallback events remain generic until the instrumented service supplies a controlled semantic key.

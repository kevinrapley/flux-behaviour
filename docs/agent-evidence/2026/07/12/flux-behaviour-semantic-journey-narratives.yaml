    promotion_decisions:
      - decision: Translate only controlled type-first semantic keys into purpose-led labels.
        reason: Positional keys cannot safely establish interface meaning and visible text may contain personal or dynamic content.
      - decision: Describe OTP lifecycle outcomes without capturing authentication input.
        reason: A successful service milestone answers the journey question while keeping code, length, email, challenge and account identity outside analytics.
      - decision: Treat zero-character field blur as focus without input.
        reason: Reporting zero typed characters as typing is a materially false journey narrative.
      - decision: Distinguish keyboard entry from paste and autofill using metadata-only edit, paste and final-length counts.
        reason: A zero key-press count does not mean the field was untouched when another privacy-safe input signal shows a change.
      - decision: Require trust class, service role and the neutral auth.otp key before translating an authentication action into an outcome.
        reason: An action name alone cannot safely establish that OTP verification happened.
      - decision: Reject every optional metadata property on an authentication milestone at SDK and collector validation boundaries.
        reason: Even otherwise bounded metadata such as value length can reveal authentication-code characteristics.
      - decision: Treat a value as visitor input only when keypress, edit or paste evidence exists.
        reason: A prefilled value length describes existing content, not an interaction in the current session.
      - decision: Suppress sensitive and auth form submit capture and auto-prefix structural page fallbacks.
        reason: Neutral lifecycle events should represent authentication, and URL segments must never be promoted into controlled service meaning.
      - decision: Enforce auth-form suppression, auth-field exclusion and edited-value evidence for manual instrumentation as well as auto-capture.
        reason: A service must not be able to bypass privacy rules by calling the SDK or collector directly.
      - decision: Require a literal page. prefix before rendering purpose-led page meaning.
        reason: Legacy hyphenated and URL-derived keys can begin with the word page without being controlled semantic declarations.
      - decision: Reject every auth-scoped semantic control outside the neutral lifecycle API.
        reason: Button, link and tab capture can reveal authentication interaction just as fields and forms can.
      - decision: Normalise auth scopes case-insensitively, propagate form sensitivity to descendants and reserve auth.otp exclusively.
        reason: Marker inheritance, key casing and reserved-key misuse must not create alternate paths around authentication privacy controls.
      - decision: Detect auth tokens at any semantic-key segment and propagate every sensitive ancestor marker.
        reason: Nested namespaces and non-form sensitive containers must not weaken the same privacy boundary.
    commands_run:
      - command: npm test
        result: pass
        evidence: All 156 tests passed, including manual SDK and collector privacy-policy enforcement plus narrative regressions for prefilled values, legacy page keys, sensitive ancestry, nested auth scopes, case variants, reserved-key misuse and metadata-free authentication outcomes.
      - command: npx --yes node@20 --test tests/*.test.mjs
        result: pass
        evidence: All 156 tests passed under Node 20.20.2, the repository's declared runtime baseline.
      - command: npm run validate
        result: pass

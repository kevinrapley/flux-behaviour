<!doctype html>
<html class="govuk-template govuk-template--rebranded" lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Sign in – Flux Behaviour</title><link rel="stylesheet" href="/assets/styles/demo.css"></head>
<body class="govuk-template__body"><div class="govuk-width-container"><main class="govuk-main-wrapper" id="main-content"><h1 class="govuk-heading-xl">Create an account or sign in</h1><p class="govuk-body">Enter your email address and we will create your account if needed, then send a one-time code.</p><form class="govuk-form-group" data-flux-login-form><label class="govuk-label" for="email">Email address</label><input class="govuk-input" id="email" name="email" type="email" autocomplete="email" required><label class="govuk-label" for="code">One-time code</label><input class="govuk-input" id="code" name="code" inputmode="numeric" autocomplete="one-time-code" hidden><button class="govuk-button" type="submit">Continue</button></form><p class="govuk-body" data-flux-login-status aria-live="polite"></p></main></div><script type="module" src="/assets/flux/account/otp-login.mjs"></script></body>
</html>

records:
  - id: CONF-001
    rule: Security policy exists
    expected_evidence: SECURITY.md exists
    actual_evidence: SECURITY.md created
    status: present
    owner: maintainer
  - id: CONF-002
    rule: Local agent instructions exist
    expected_evidence: AGENTS.md exists
    actual_evidence: AGENTS.md created
    status: present
    owner: maintainer
  - id: CONF-003
    rule: Prototype promotion is controlled
    expected_evidence: Migration docs exist
    actual_evidence: docs/migration/source-inventory.md created
    status: present
    owner: product-lead
  - id: CONF-004
    rule: Public-service harm register exists
    expected_evidence: harm-register.yaml exists
    actual_evidence: harm-register.yaml created with release blocked at foundation stage
    status: present
    owner: governance-lead
  - id: CONF-005
    rule: Event capture must be governed by a metadata-only schema before collector promotion
    expected_evidence: contracts/events/flux-event.schema.json and tests/event-schema.test.mjs exist
    actual_evidence: Baseline event schema and schema tests added on chore/governance-event-schema-baseline
    status: present
    owner: product-lead
  - id: CONF-006
    rule: Scoring configuration must be preserved as reference lineage before runtime scoring promotion
    expected_evidence: config/scoring/flux-scoring-config.v6.10.reference.json and tests/scoring-config.test.mjs exist
    actual_evidence: Reference-only scoring baseline and validation tests added on chore/governance-event-schema-baseline
    status: present
    owner: governance-lead
  - id: CONF-007
    rule: Event schema must be tested against valid and invalid fixtures before collector promotion
    expected_evidence: fixtures/events/valid, fixtures/events/invalid and tests/event-fixtures.test.mjs exist
    actual_evidence: Valid and invalid event fixtures added on test/validation-fixture-baseline
    status: present
    owner: product-lead
  - id: CONF-008
    rule: Scoring interpretation must have reference cases before scoring engine promotion
    expected_evidence: fixtures/scoring/reference-cases and tests/scoring-reference-fixtures.test.mjs exist
    actual_evidence: Reference scoring cases and fixture checks added on test/validation-fixture-baseline
    status: present
    owner: governance-lead
  - id: CONF-009
    rule: Runtime collector and SDK code must use a shared event validation module
    expected_evidence: src/events/validate-event.mjs, src/events/event-validation-errors.mjs and tests/event-validation.test.mjs exist
    actual_evidence: Runtime-neutral event validation module added on feature/event-validation-module
    status: present
    owner: product-lead
  - id: CONF-010
    rule: Collector route handling must validate events before any storage binding is introduced
    expected_evidence: src/collector/router.mjs, src/collector/responses.mjs and tests/collector-router.test.mjs exist
    actual_evidence: Collector route scaffold added on feature/collector-route-scaffold with storage disabled
    status: present
    owner: product-lead
  - id: CONF-011
    rule: Cloudflare adapter must delegate to collector routes without adding storage or deployment configuration
    expected_evidence: src/cloudflare/worker.mjs, tests/cloudflare-worker-adapter.test.mjs and docs/cloudflare/worker-adapter.md exist
    actual_evidence: Cloudflare Worker adapter added on feature/cloudflare-worker-adapter with storage disabled
    status: present
    owner: product-lead
  - id: CONF-012
    rule: Public collector boundary must define CORS, request-size and rate-limit controls before storage is introduced
    expected_evidence: src/collector/boundary-controls.mjs, tests/collector-boundary-controls.test.mjs and docs/collector/boundary-controls.md exist
    actual_evidence: Boundary control scaffold added on feature/collector-boundary-controls with storage still disabled
    status: present
    owner: product-lead

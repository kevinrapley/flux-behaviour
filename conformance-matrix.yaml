records:
  - id: CONF-027
    rule: Model and dashboard completion claims must be reconciled requirement by requirement against current repository and release evidence
    expected_evidence: All 25 source-grounded roadmap rows have one explicit state, authoritative evidence and a residual gap/release boundary; stale implementation claims are corrected
    actual_evidence: docs/product/model-dashboard-completion-audit.md classifies MODEL-01–13, DASH-01–10, NLP-01 and ADAPT-01 and maps each partial or retained item to GAP-013/015/016/017 or an explicit release gate. A regression test verifies complete unique coverage.
    status: present-with-release-blockers
    owner: product-lead

  - id: CONF-026
    rule: Lifecycle analytics must remain aggregate, privacy-suppressed and neutral about individual learning or ability
    expected_evidence: Return intervals, visit frequency, maturity movement and comparable friction rates use explicit samples, k=5 controls, bounded periods and alternative explanations without returning identifiers
    actual_evidence: src/product/lifecycle-analytics.mjs and the Cohorts dashboard area provide aggregate MODEL-12 evidence. Regression tests cover suppression, interval history, denominators, celeration and response privacy.
    status: present-with-release-blockers
    owner: governance-lead

  - id: CONF-025
    rule: Dashboard report areas and uncertainty must support accessible investigation without overstating precision
    expected_evidence: Target report areas share URL-backed filters; rates expose samples and bounded intervals; governance keeps unknown collection controls visible
    actual_evidence: The dashboard template and runtime implement nine native-link report areas, shared filter continuity and heading focus. src/product/report-uncertainty.mjs provides Wilson 95% intervals and an aggregate governance report with explicit collection, retention and model-coverage limitations.
    status: present-with-release-blockers
    owner: product-lead

  - id: CONF-024
    rule: Dashboard comparisons and exports must be bounded, aggregate, privacy-thresholded and provenance-bearing
    expected_evidence: Safe comparison dimensions suppress groups below five journeys; custom ranges are limited; authenticated CSV exports include query/model/schema provenance and exclude raw events and identifiers
    actual_evidence: src/product/comparison-reports.mjs, src/product/aggregate-export.mjs, dashboard controls and focused tests implement four controlled comparison dimensions, 366-day custom range limits and allow-listed aggregate CSV with formula-injection protection and row-level provenance.
    status: present-with-release-blockers
    owner: product-lead

  - id: CONF-023
    rule: Transaction funnels and field reports must use configured order, explicit outcomes and privacy-safe aggregate evidence
    expected_evidence: Exact-version funnels expose starts, sequential steps, completion, abandonment and recovery with explicit denominators; fields expose required status, coverage, validation, dwell and safe length distributions without values
    actual_evidence: src/product/funnel-field-reports.mjs, authenticated dashboard panels and focused SQLite-backed tests implement publisher-ordered funnels, 30-minute closed-session abandonment, explicit recovery, neutral non-interaction, required empty-field validation attempts and aggregate dwell/length buckets.
    status: present-with-release-blockers
    owner: product-lead

  - id: CONF-022
    rule: Event and semantic service reports must use exact-version configured meaning and like-for-like aggregate evidence
    expected_evidence: Ranked events, configured key events, semantic elements and service entities expose event-active journey reach, comparisons, entry/exit, outcomes, friction and time without identifiers or raw events
    actual_evidence: src/product/event-entity-reports.mjs, migration 0006, dashboard event/entity panels and focused tests implement exact-model event, key-event, page/form/control, transaction, task, step, question and field reports with complete bounded trends and previous-period movement.
    status: present-with-release-blockers
    owner: product-lead

  - id: CONF-021
    rule: Realtime analytics must report aggregate activity and ingestion freshness without exposing a live user snapshot
    expected_evidence: Server acceptance timestamps, indexed 5/30-minute queries, zero-filled minute buckets, accessible presentation and privacy regression tests exist
    actual_evidence: migration 0005, src/product/realtime-analytics.mjs, dashboardRealtime, the realtime dashboard panel and focused tests provide aggregate session/event counts and freshness without visitor or session identifiers.
    status: present-with-release-blockers
    owner: product-lead

  - id: CONF-020
    rule: Analytics outcomes must resolve from a versioned publisher service model rather than generic submit inference
    expected_evidence: A privacy-safe model contract, immutable D1 publication, event-time context, configured ResearchOps seed, aggregate dashboard evidence and regression tests exist
    actual_evidence: contracts/models/flux-service-model.schema.json, migrations 0003 and 0004, src/model, collector integration and dashboard tests implement the service hierarchy, bounded runtime validation, transaction-consistent outcomes and unambiguous key events; completion metrics require configured success outcomes, and dashboard evidence is scoped to the exact published model version.
    status: present-with-release-blockers
    owner: product-lead

  - id: CONF-019
    rule: Behaviour model and dashboard roadmap must be grounded in source expectations, current implementation evidence and humane analytics boundaries
    expected_evidence: A source register, current-capability inventory, prioritised gap matrix, rejected historical expectations and acceptance criteria exist
    actual_evidence: docs/product/behaviour-model-dashboard-gap-analysis.md maps the provided Drive corpus, source-referenced dashboard artefacts, GA screenshots and repository runtime to 25 governed gaps and explicit rejection/reframing decisions.
    status: present
    owner: product-lead

  - id: CONF-017
    rule: Publisher services consume a hosted Flux capture engine rather than copying analytics logic or linguistic resources
    expected_evidence: Flux owns the versioned auto-capture module, session lifecycle, keyboard semantics, autocomplete privacy milestone, UK-English analyser and dictionary build; publisher integration is an include plus controlled attributes
    actual_evidence: src/sdk/flux-auto-capture.mjs and src/writing provide the hosted runtime, with regression tests for WPM, session-scoped final Tab destinations, key-accurate activation, autocomplete privacy, OTP outcomes, inactivity rollover and publisher-controlled semantic keys.
    status: present-with-release-blockers
    owner: product-lead

  - id: CONF-016
    rule: UK English writing signals must be consented, on-device, atomic, bounded and non-reversible
    expected_evidence: The event contract, SDK, collector presentation and tests accept only the complete en-GB count bundle and never entered text or words
    actual_evidence: Contract v1.2.0 permits the optional seven-field en-GB bundle, runtime privacy validation rejects partial bundles, the SDK allow-lists only those counts, and narrative and scoring tests use possible-issue service-friction language.
    status: present-with-release-blockers
    owner: governance-lead

  - id: CONF-018
    rule: Typing speed for edited fields must measure the current interaction rather than pre-existing content
    expected_evidence: Hosted capture calculates standard gross WPM from printable keystrokes over active typing time and regression coverage includes a prefilled textarea
    actual_evidence: The auto-capture runtime divides current printable keystrokes by five over the first-to-last typing interval; tests prove a 100-word prefilled field cannot inflate a 150-keystroke, 30-second edit beyond 60 WPM.
    status: present
    owner: product-lead

  - id: CONF-001
    rule: Security policy exists
    expected_evidence: SECURITY.md exists
    actual_evidence: SECURITY.md created
    status: present
    owner: maintainer
  - id: CONF-002
    rule: Local agent instructions exist
    expected_evidence: AGENTS.md exists
    actual_evidence: AGENTS.md created
    status: present
    owner: maintainer
  - id: CONF-003
    rule: Prototype promotion is controlled
    expected_evidence: Migration docs exist
    actual_evidence: docs/migration/source-inventory.md created
    status: present
    owner: product-lead
  - id: CONF-004
    rule: Public-service harm register exists
    expected_evidence: harm-register.yaml exists
    actual_evidence: harm-register.yaml created with release blocked at foundation stage
    status: present
    owner: governance-lead
  - id: CONF-005
    rule: Event capture must be governed by a metadata-only schema before collector promotion
    expected_evidence: contracts/events/flux-event.schema.json and tests/event-schema.test.mjs exist
    actual_evidence: Baseline event schema and schema tests added on chore/governance-event-schema-baseline
    status: present
    owner: product-lead
  - id: CONF-006
    rule: Scoring configuration must be preserved as reference lineage before runtime scoring promotion
    expected_evidence: config/scoring/flux-scoring-config.v6.10.reference.json and tests/scoring-config.test.mjs exist
    actual_evidence: Reference-only scoring baseline and validation tests added on chore/governance-event-schema-baseline
    status: present
    owner: governance-lead
  - id: CONF-007
    rule: Event schema must be tested against valid and invalid fixtures before collector promotion
    expected_evidence: fixtures/events/valid, fixtures/events/invalid and tests/event-fixtures.test.mjs exist
    actual_evidence: Valid and invalid event fixtures added on test/validation-fixture-baseline
    status: present
    owner: product-lead
  - id: CONF-008
    rule: Scoring interpretation must have reference cases before scoring engine promotion
    expected_evidence: fixtures/scoring/reference-cases and tests/scoring-reference-fixtures.test.mjs exist
    actual_evidence: Reference scoring cases and fixture checks added on test/validation-fixture-baseline
    status: present
    owner: governance-lead
  - id: CONF-009
    rule: Runtime collector and SDK code must use a shared event validation module
    expected_evidence: src/events/validate-event.mjs, src/events/event-validation-errors.mjs and tests/event-validation.test.mjs exist
    actual_evidence: Runtime-neutral event validation module added on feature/event-validation-module
    status: present
    owner: product-lead
  - id: CONF-010
    rule: Collector route handling must validate events before any storage binding is introduced
    expected_evidence: src/collector/router.mjs, src/collector/responses.mjs and tests/collector-router.test.mjs exist
    actual_evidence: Collector route scaffold added on feature/collector-route-scaffold with storage disabled
    status: present
    owner: product-lead
  - id: CONF-011
    rule: Cloudflare adapter must delegate to collector routes without adding storage or deployment configuration
    expected_evidence: src/cloudflare/worker.mjs, tests/cloudflare-worker-adapter.test.mjs and docs/cloudflare/worker-adapter.md exist
    actual_evidence: Cloudflare Worker adapter added on feature/cloudflare-worker-adapter with storage disabled
    status: present
    owner: product-lead
  - id: CONF-012
    rule: Public collector boundary must define CORS, request-size and rate-limit controls before storage is introduced
    expected_evidence: src/collector/boundary-controls.mjs, tests/collector-boundary-controls.test.mjs and docs/collector/boundary-controls.md exist
    actual_evidence: Boundary control scaffold added on feature/collector-boundary-controls with storage still disabled
    status: present
    owner: product-lead
  - id: CONF-013
    rule: Stored behavioural analytics must be tenant-scoped, consented, pseudonymous and metadata-only
    expected_evidence: D1 migration, product router, browser SDK and runtime tests exist
    actual_evidence: D1 tenant/session/event model, consent-first browser SDK, cross-origin preflight controls, Google-identity dashboard access, source-backed purpose-led session narratives, period-based cumulative visitor and returning-visitor analytics, accessible daily trends, journey-health summaries, privacy-preserving journey cohorts and all 20 demo-model indicators computed from metadata-only session events are implemented. Controlled type-first page and element keys support named page, tab, link, button, field and form narratives; unchanged prefilled fields do not emit their existing value length; URL-derived page fallbacks remain generic; and allow-listed OTP lifecycle outcomes require a neutral service shape with no optional metadata. Sensitive authentication inputs and form submissions are excluded from auto-capture, named cohorts below five journeys are suppressed, the primary dashboard does not expose visitor identifiers and recent journey events are bounded before authenticated complete-history drill-down. DPIA, accessibility, retention, rate limiting, incident controls, cohort fairness review and scoring-corpus validation remain release blockers.
    status: present-with-release-blockers
    owner: product-lead
  - id: CONF-014
    rule: Behavioural cohort analytics must be aggregate, journey-framed, privacy-thresholded and explicit about heuristic coverage
    expected_evidence: Cohort analytics module, dashboard copy, tests and product/governance documentation exist
    actual_evidence: Visit-maturity, outcome-path and interaction-pattern cohorts are calculated from consented metadata; named groups require five journeys, neutral evidence remains unclassified, incomplete pattern histories are excluded and sample limits are disclosed.
    status: present-with-release-blockers
    owner: governance-lead
  - id: CONF-015
    rule: Journey narratives must not expose generated DOM identifiers or misattribute focus-exit input to typing
    expected_evidence: Narrative and journey-presentation tests cover semantic focus, keyboard entry, focus exit and historical auto-key fallbacks
    actual_evidence: Controlled text-area keys produce purpose-led focus and typing prose; generated keys are shown only as unlabelled control types; stored events are re-presented on read; and pre-input dwell, total focus and active typing duration remain distinct throughout capture, presentation, aggregates and session scoring.
    status: present
    owner: product-lead

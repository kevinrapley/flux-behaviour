agent_evidence_registry:
  version: 1
  purpose: Registry for agent evidence records. Individual records live under docs/agent-evidence/YYYY/MM/DD/.
  canonical_format:
    root_key: evidence_records
    item_key: task_id
    required_fields:
      - task_id
      - mode
      - repository
      - risk_level
      - base_branch
      - working_branch
      - files_read
      - files_changed
      - promotion_decisions
      - commands_run
      - recent_learnings
      - security
      - privacy
      - accessibility
      - risks
  storage_rule:
    new_records: Add one file per task under docs/agent-evidence/YYYY/MM/DD/.
    root_file: Keep this file as the registry and canonical format reference only.
    naming: Use the task_id as the filename, with .yaml extension.
  entries:
    - task_id: flux-behaviour-governance-event-schema-baseline
      date: 2026-05-29
      path: docs/agent-evidence/2026/05/29/flux-behaviour-governance-event-schema-baseline.yaml
      status: externalised
    - task_id: flux-behaviour-validation-fixture-baseline
      date: 2026-05-29
      path: docs/agent-evidence/2026/05/29/flux-behaviour-validation-fixture-baseline.yaml
      status: externalised
    - task_id: flux-behaviour-event-validation-module
      date: 2026-05-29
      path: docs/agent-evidence/2026/05/29/flux-behaviour-event-validation-module.yaml
      status: externalised
    - task_id: flux-behaviour-collector-route-scaffold
      date: 2026-05-29
      path: docs/agent-evidence/2026/05/29/flux-behaviour-collector-route-scaffold.yaml
      status: externalised
    - task_id: flux-behaviour-cloudflare-worker-adapter
      date: 2026-05-29
      path: docs/agent-evidence/2026/05/29/flux-behaviour-cloudflare-worker-adapter.yaml
      status: externalised

agent_evidence_registry:
  version: 1
  purpose: Registry for agent evidence records. Individual records live under docs/agent-evidence/YYYY/MM/DD/.
  canonical_format:
    root_key: evidence_records
    item_key: task_id
    required_fields:
      - task_id
      - mode
      - repository
      - risk_level
      - base_branch
      - working_branch
      - files_read
      - files_changed
      - promotion_decisions
      - commands_run
      - recent_learnings
      - security
      - privacy
      - accessibility
      - risks
  storage_rule:
    new_records: Add one file per task under docs/agent-evidence/YYYY/MM/DD/.
    root_file: Keep this file as the registry and canonical format reference only.
    naming: Use the task_id as the filename, with .yaml extension.

gaps:
  - id: GAP-001
    title: GitHub branch protection and security settings require API verification
    severity: high
    observed_state: Desired state is documented, but live enforcement has not been API-verified.
    expected_state: Main branch requires pull requests, CODEOWNERS review, status checks and blocks force pushes.
    risk: Documented posture may not match enforced posture.
    action: Configure and verify GitHub settings after the foundation PR is open.
    owner: maintainer
    status: open
  - id: GAP-002
    title: Runtime product code requires governed production assurance
    severity: medium
    observed_state: Pages API, D1 model, browser SDK, account UI and dashboard have been promoted, but the work is awaiting reviewed PRs and release assurance.
    expected_state: Runtime code is reviewed with DPIA, accessibility, retention, incident and rate-limit evidence before general availability.
    risk: Live collection could be enabled without the assurance controls required for a public-service analytics product.
    action: Complete release assurance and retain the production blocks in GAP-003, GAP-004 and GAP-005.
    owner: product-lead
    status: open
  - id: GAP-003
    title: DPIA and accessibility evidence are not complete
    severity: high
    observed_state: Starter records exist only.
    expected_state: DPIA and full accessibility evidence completed before live processing or UI release.
    risk: Public-service deployment may be unsafe or non-compliant.
    action: Complete governance and accessibility evidence before release.
    owner: governance-lead
    status: open
  - id: GAP-004
    title: Cloudflare Worker adapter lacks production deployment controls
    severity: high
    observed_state: Worker-compatible adapter now has boundary control scaffolding for CORS, preflight, allowed headers, request body size and a rate-limit interface, but lacks wrangler configuration, routes, production rate limiting, retention policy or storage bindings.
    expected_state: Deployment controls, request limits, CORS policy and retention decisions are reviewed before any public route is exposed.
    risk: A collector boundary could be exposed before operational safeguards are complete.
    action: Add and review Cloudflare deployment posture, production rate limiting, retention, deletion and storage policy before enabling live collection.
    owner: product-lead
    status: open
  - id: GAP-005
    title: Demo dashboard charts follow ONS Charts patterns but do not vendor the library
    severity: low
    observed_state: demo/assets/flux-charts.js implements bar and line charts following ONS Charts conventions with d3.
    expected_state: Visualisations vendor or consume ONSdigital/Charts templates directly so upstream improvements flow through.
    risk: Chart behaviour may drift from ONS accessibility and styling standards.
    action: Replace bespoke chart modules with vendored ONSdigital/Charts templates once the dashboard has real data.
    owner: product-lead
    status: open
  - id: GAP-006
    title: Demo prototype has not been through a full accessibility audit
    severity: medium
    observed_state: Demo pages use GOV.UK Frontend components and patterns with accessible summaries on charts, but no audit has run.
    expected_state: Keyboard, screen reader and axe-style audits recorded in accessibility-evidence.md before any public deployment.
    risk: Demo may ship inaccessible interactions, undermining the product's public-service positioning.
    action: Run and record an accessibility audit of the demo before it is deployed anywhere public.
    owner: governance-lead
    status: open
  - id: GAP-007
    title: SDK tag events are fire-and-forget with no delivery observability
    severity: low
    observed_state: The tag drops events on transport failure and sendBeacon acceptance does not confirm delivery.
    expected_state: Collector-side received-event metrics make loss rates visible before production adoption.
    risk: Services could over-trust dashboards built on partially delivered data.
    action: Add collector-side acceptance metrics when storage is promoted.
    owner: product-lead
    status: open
  - id: GAP-008
    title: Playground scoring is ported prototype logic, not corpus-validated scoring
    severity: low
    observed_state: The playground ports the original v46.s engine and the original playground's signal mappings (applyAutoNudges, frustration soothing, persona deltas), with exploratory-dimension mappings derived from the v6.10 formula directions.
    expected_state: Promoted scoring validated against the original repository's golden corpus (R pipeline) before any score leaves a demo context.
    risk: Viewers could over-trust demo score movements as validated behavioural measurement.
    action: Validate the ported engine and mappings against the golden corpus cases when scoring is promoted.
    owner: product-lead
    status: open
  - id: GAP-009
    title: Google OAuth end-to-end account sign-in needs browser-session evidence
    severity: medium
    observed_state: Production secret names, callback redirect, D1 identity migration and the seeded ResearchOps account access were verified. The provider-consent browser completion has not yet been recorded as release evidence.
    expected_state: An authorised account completes Google consent, reaches the protected dashboard and is recorded in `external_identities` without exposing visitor analytics identity.
    risk: A provider-side configuration issue could still prevent a real dashboard session.
    action: Record a consented Google browser sign-in and protected dashboard check before release approval.
    owner: security-lead
    status: open

gaps:
  - id: GAP-012
    title: UK English writing indicators need representative corpus, accessibility and fairness validation
    severity: high
    observed_state: Flux accepts bounded en-GB spelling, grammar and casing counts and applies only a small service-friction signal, but dictionary and grammar results can be false positives for names, specialist terms, dialect, disability, language background and valid writing styles.
    expected_state: Representative consented corpus evidence quantifies false positives and confirms safe interpretation with privacy, accessibility and fairness reviewers.
    risk: Analysts could mistake heuristic linguistic counts for a person's capability or disadvantage groups whose writing differs from the analyser assumptions.
    action: Keep possible-issue wording and the no-person-level/no-automated-decision boundary; validate the signals before operational interpretation.
    owner: governance-lead
    status: open

  - id: GAP-001
    title: GitHub branch protection and security settings require API verification
    severity: high
    observed_state: Desired state is documented, but live enforcement has not been API-verified.
    expected_state: Main branch requires pull requests, CODEOWNERS review, status checks and blocks force pushes.
    risk: Documented posture may not match enforced posture.
    action: Configure and verify GitHub settings after the foundation PR is open.
    owner: maintainer
    status: open
  - id: GAP-002
    title: Runtime product code requires governed production assurance
    severity: medium
    observed_state: Pages API, D1 model, browser SDK, account UI, purpose-led semantic narratives and dashboard have been promoted, but the work is awaiting reviewed PRs and release assurance.
    expected_state: Runtime code is reviewed with DPIA, accessibility, retention, incident and rate-limit evidence before general availability.
    risk: Live collection could be enabled without the assurance controls required for a public-service analytics product.
    action: Complete release assurance and retain the production blocks in GAP-003, GAP-004 and GAP-005.
    owner: product-lead
    status: open
  - id: GAP-003
    title: DPIA and accessibility evidence are not complete
    severity: high
    observed_state: Starter records exist only.
    expected_state: DPIA and full accessibility evidence completed before live processing or UI release.
    risk: Public-service deployment may be unsafe or non-compliant.
    action: Complete governance and accessibility evidence before release.
    owner: governance-lead
    status: open
  - id: GAP-004
    title: Cloudflare Worker adapter lacks production deployment controls
    severity: high
    observed_state: Worker-compatible adapter now has boundary control scaffolding for CORS, preflight, allowed headers, request body size and a rate-limit interface, but lacks wrangler configuration, routes, production rate limiting, retention policy or storage bindings.
    expected_state: Deployment controls, request limits, CORS policy and retention decisions are reviewed before any public route is exposed.
    risk: A collector boundary could be exposed before operational safeguards are complete.
    action: Add and review Cloudflare deployment posture, production rate limiting, retention, deletion and storage policy before enabling live collection.
    owner: product-lead
    status: open
  - id: GAP-005
    title: Live dashboard has no standard visualisation-template dependency
    severity: low
    observed_state: The authenticated dashboard now renders a responsive SVG audience trend with a text alternative and an expandable source-data table. It remains a locally reviewed implementation rather than a standard visualisation-template dependency.
    expected_state: Any future live visualisation uses a reviewed accessible template or component rather than bespoke fixture graphics.
    risk: A future dashboard chart could drift from accessibility and styling standards.
    action: Complete browser, keyboard and screen-reader review, then assess a standard visualisation template before expanding the chart catalogue.
    owner: product-lead
    status: open
  - id: GAP-006
    title: Demo prototype has not been through a full accessibility audit
    severity: medium
    observed_state: Demo pages use GOV.UK Frontend components and patterns with accessible summaries on charts, but no audit has run.
    expected_state: Keyboard, screen reader and axe-style audits recorded in accessibility-evidence.md before any public deployment.
    risk: Demo may ship inaccessible interactions, undermining the product's public-service positioning.
    action: Run and record an accessibility audit of the demo before it is deployed anywhere public.
    owner: governance-lead
    status: open
  - id: GAP-007
    title: SDK tag events are fire-and-forget with no delivery observability
    severity: low
    observed_state: The tag drops events on transport failure and sendBeacon acceptance does not confirm delivery.
    expected_state: Collector-side received-event metrics make loss rates visible before production adoption.
    risk: Services could over-trust dashboards built on partially delivered data.
    action: Add collector-side acceptance metrics when storage is promoted.
    owner: product-lead
    status: open
  - id: GAP-008
    title: Playground scoring is ported prototype logic, not corpus-validated scoring
    severity: low
    observed_state: The dashboard computes all 20 demo-model indicators from a deliberately constrained, metadata-only production signal set. Unsupported indicators remain neutral; pre-input dwell is now separated from active typing time, but the mapping has not been compared with the original repository's golden corpus.
    expected_state: Promoted scoring validated against the original repository's golden corpus (R pipeline) before any score supports a production interpretation beyond human-led service improvement.
    risk: Teams could over-trust a heuristic service-friction indicator as validated behavioural measurement.
    action: Validate the promoted session mapping against golden corpus cases, publish interpretation guidance and retain the no-automated-decision boundary.
    owner: product-lead
    status: open
  - id: GAP-009
    title: Google OAuth end-to-end account sign-in needs browser-session evidence
    severity: medium
    observed_state: Production secret names, callback redirect, D1 identity migration and the seeded ResearchOps account access were verified. The provider-consent browser completion has not yet been recorded as release evidence.
    expected_state: An authorised account completes Google consent, reaches the protected dashboard and is recorded in `external_identities` without exposing visitor analytics identity.
    risk: A provider-side configuration issue could still prevent a real dashboard session.
    action: Record a consented Google browser sign-in and protected dashboard check before release approval.
    owner: security-lead
    status: open
  - id: GAP-010
    title: Journey-pattern cohorts need corpus and fairness validation
    severity: medium
    observed_state: The dashboard aggregates original Flux journey-pattern rules with a neutral-evidence guard, complete-history checks, a 250-session coverage limit and minimum named cohort size of five. The rules have not been validated across assistive technology, disability, neurodivergence, language, device or high-stress journey contexts.
    expected_state: Golden-corpus, false-positive and cohort fairness evidence demonstrates that pattern differences support service investigation without proxy discrimination or deficit framing.
    risk: Teams could over-interpret heuristic journey patterns or mistake accessibility and careful behaviour for low ability or friction.
    action: Complete the golden corpus, run inclusive cohort reviews, publish uncertainty guidance and keep all cohort use human-led and service-improvement-only.
    owner: governance-lead
    status: open
  - id: GAP-011
    title: Historical generated keys cannot recover missing service purpose
    severity: low
    observed_state: Read-time presentation removes auto identifiers and ordinals from historical journeys, but events captured without a controlled data-flux-key contain no reliable purpose label.
    expected_state: Instrumented services provide stable semantic keys for important controls before collection.
    risk: Older events remain less informative than newly instrumented journeys.
    action: Continue semantic instrumentation at the publisher and never infer purpose from DOM position.
    owner: product-lead
    status: open

name: CI (Accessibility)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Run check
        run: |
          test -f accessibility-evidence.md
          grep -qi "release decision" accessibility-evidence.md
          grep -qi "keyboard" accessibility-evidence.md

name: CI (Accessibility)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Run check
        run: |
          test -f accessibility-evidence.md
          grep -qi "release decision" accessibility-evidence.md
          grep -qi "keyboard" accessibility-evidence.md

name: CI (Accessibility)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Run check
        run: |
          test -f accessibility-evidence.md
          grep -qi "release decision" accessibility-evidence.md
          grep -qi "keyboard" accessibility-evidence.md

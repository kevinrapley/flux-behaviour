name: File Inventory

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
      - name: Run check
        run: |
          find . -path ./.git -prune -o -type f -print | sort > file-inventory.txt
          test -s file-inventory.txt

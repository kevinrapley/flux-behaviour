name: CI (Performance)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - name: Run check
        run: |
          test -f performance-budget.yaml
          grep -q "PERF-001" performance-budget.yaml

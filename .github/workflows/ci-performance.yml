name: CI (Performance)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Run check
        run: |
          test -f performance-budget.yaml
          grep -q "PERF-001" performance-budget.yaml

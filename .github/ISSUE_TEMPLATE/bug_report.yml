name: Bug report
description: Report a reproducible defect
title: "[Bug]: "
labels: ["type:bug", "needs:triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Do not include secrets or personal data.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety checks
      options:
        - label: I have not included secrets, credentials, personal data or raw telemetry.
          required: true
